name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install librtlsdr
        run: sudo apt-get update && sudo apt-get install -y librtlsdr-dev libusb-1.0-0-dev
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
