name: CI

# Trigger policy:
#   - push to main only: post-merge gate + protects against direct
#     pushes to main bypassing PRs. Per-branch push triggers used to
#     duplicate every PR run (one from push, one from pull_request);
#     narrowing to main fixes that.
#   - pull_request: every PR, every update. The branch's CI runs come
#     in via this trigger.
#   - paths-ignore: docs-only / config-example-only / license-only
#     changes don't compile any Go code, so skip the CI matrix
#     entirely. Branch protection auto-passes the required checks
#     when a workflow is skipped via paths-ignore (GitHub default
#     since the actions/runner #2080 fix), so this doesn't block PR
#     merges.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "config.example.yaml"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "config.example.yaml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      # Linux audio playback runs through internal/voice/player/alsa_linux.go,
      # which dlopens libasound2.so.2 via github.com/ebitengine/purego at
      # runtime. No build-time dev headers required; the runtime library
      # ships with ubuntu-latest. macOS / Windows use the oto-backed
      # fallback (oto/v3 is purego-only on those platforms).
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: make integration

  # The pure-Go USB transport (internal/sdr/rtlsdr/usb) lands platform-
  # specific backends — Linux USBDEVFS, Windows WinUSB, macOS IOKit
  # (PR-10). Each must build + test cleanly under CGO_ENABLED=0 on its
  # native runner before merge.
  usb-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...

  usb-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...

  # dvsi exercises the patent-encumbered DVSI USB-3000 / AMBE-3003
  # hardware backend behind the `-tags dvsi` build tag. The tagged
  # tests use a scripted mock Transport and a software-loopback
  # Transport so the wire protocol + Vocoder state machine + the
  # voice.Vocoder interface conformance run in CI without a real chip.
  dvsi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Vet (tagged)
        run: go vet -tags dvsi ./internal/voice/dvsi/...
      - name: Build (tagged)
        run: go build -tags dvsi ./internal/voice/dvsi/...
      - name: Test (tagged)
        run: make test-dvsi

  # integration runs every //go:build integration test across the
  # repository, not just the ones in cmd/gophertrunk/. The
  # build-test job above already runs `make integration` (the
  # cmd-only target) — this job's `make test-integration` walks the
  # whole module so a future integration-tagged test landing in a
  # new package can't silently skip CI.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: make test-integration

  # govulncheck enumerates known CVEs that affect the direct +
  # transitive dependency graph. Failing this job blocks merge — a
  # known-vulnerable dep means the operator has to either upgrade
  # the dep, accept the risk with a documented justification, or
  # find a non-vulnerable substitute.
  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: govulncheck ./...

  # licenses regenerates the transitive-deps inventory and confirms
  # no new dependency landed under an incompatible license. The
  # hand-curated THIRD_PARTY_LICENSES.md table covers direct deps;
  # this job backstops it with the full graph from go-licenses.
  # `continue-on-error: true` while go-licenses has known false
  # positives against Go 1.25 (https://github.com/google/go-licenses/issues/128);
  # tighten to a hard failure once upstream lands the fix.
  licenses:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@latest
      - name: Regenerate inventory
        run: make licenses
      - name: Inspect diff against committed copy
        run: git diff --exit-code THIRD_PARTY_LICENSES.csv || true
