name: CI

# Trigger policy:
#   - push to main only: post-merge gate + protects against direct
#     pushes to main bypassing PRs. Per-branch push triggers used to
#     duplicate every PR run (one from push, one from pull_request);
#     narrowing to main fixes that.
#   - pull_request: every PR, every update. The branch's CI runs come
#     in via this trigger.
#   - paths-ignore: docs-only / config-example-only / license-only
#     changes don't compile any Go code, so skip the CI matrix
#     entirely. Branch protection auto-passes the required checks
#     when a workflow is skipped via paths-ignore (GitHub default
#     since the actions/runner #2080 fix), so this doesn't block PR
#     merges.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "config.example.yaml"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "config.example.yaml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      # Linux audio playback runs through internal/voice/player/alsa_linux.go,
      # which dlopens libasound2.so.2 via github.com/ebitengine/purego at
      # runtime. No build-time dev headers required; the runtime library
      # ships with ubuntu-latest. macOS / Windows use the oto-backed
      # fallback (oto/v3 is purego-only on those platforms).
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: make integration

  # The pure-Go USB transport (internal/sdr/rtlsdr/usb) lands platform-
  # specific backends — Linux USBDEVFS, Windows WinUSB, macOS IOKit
  # (PR-10). Each must build + test cleanly under CGO_ENABLED=0 on its
  # native runner before merge.
  usb-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...

  usb-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...
