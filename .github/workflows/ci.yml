name: CI

# Trigger policy:
#   - push to main only: post-merge gate + protects against direct
#     pushes to main bypassing PRs. Per-branch push triggers used to
#     duplicate every PR run (one from push, one from pull_request);
#     narrowing to main fixes that.
#   - pull_request: every PR, every update. The branch's CI runs come
#     in via this trigger.
#
# We deliberately do NOT use paths-ignore here. The `Protect main`
# repository ruleset requires build-test / usb-windows / usb-macos to
# report a successful conclusion before merge, and rulesets (unlike the
# legacy branch-protection-rules system) do not auto-pass required
# checks when the workflow is skipped via paths-ignore. A skipped
# workflow leaves the PR in mergeable_state=blocked, even for docs-only
# changes. Running the full matrix on every PR is the simplest way to
# keep the required-check contract honest.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      # Linux audio playback runs through internal/voice/player/alsa_linux.go,
      # which dlopens libasound2.so.2 via github.com/ebitengine/purego at
      # runtime. No build-time dev headers required; the runtime library
      # ships with ubuntu-latest. macOS / Windows use the oto-backed
      # fallback (oto/v3 is purego-only on those platforms).
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: make integration

  # The pure-Go USB transport (internal/sdr/rtlsdr/usb) lands platform-
  # specific backends — Linux USBDEVFS, Windows WinUSB, macOS IOKit
  # (PR-10). Each must build + test cleanly under CGO_ENABLED=0 on its
  # native runner before merge.
  usb-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...

  usb-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build (CGO disabled)
        env:
          CGO_ENABLED: "0"
        run: go build ./internal/sdr/rtlsdr/usb/...
      - name: Vet
        env:
          CGO_ENABLED: "0"
        run: go vet ./internal/sdr/rtlsdr/usb/...
      - name: Test
        env:
          CGO_ENABLED: "0"
        run: go test -count=1 ./internal/sdr/rtlsdr/usb/...
