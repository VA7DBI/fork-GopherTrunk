name: Release

# Builds Windows + Linux artifacts when a SemVer tag is pushed (or
# when the workflow is triggered manually from the Actions tab) and
# uploads them to a GitHub Release.
#
# Pure-Go since PR-09: every build runs CGO_ENABLED=0. The Windows
# job no longer needs MSYS2 / mingw / DLL bundling; the Linux job no
# longer needs librtlsdr-dev. Inno Setup turns the bundled directory
# into a single setup.exe the user can run on Windows 11.
#
# Outputs in the GitHub Release:
#
#   gophertrunk-<ver>-windows-amd64-setup.exe   one-click installer
#   gophertrunk-<ver>-windows-amd64.zip         portable ZIP (no installer)
#   gophertrunk-<ver>-linux-amd64.tar.gz        Linux tarball
#   SHA256SUMS                                  per-file SHA-256 checksums
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. v0.1.0). Must start with 'v'."
        required: true
        default: "v0.0.0"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - name: Build gophertrunk.exe
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/staging
          go build \
            -trimpath \
            -ldflags "-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION} -X github.com/MattCheramie/GopherTrunk/internal/version.Commit=${COMMIT} -X github.com/MattCheramie/GopherTrunk/internal/version.BuildTime=${BUILD_TIME}" \
            -o dist/staging/gophertrunk.exe \
            ./cmd/gophertrunk

      - name: Stage docs
        shell: bash
        run: |
          set -eu
          STAGE=dist/staging
          cp README.md LICENSE config.example.yaml "$STAGE/"
          cp docs/install-windows.md "$STAGE/INSTALL-WINDOWS.md"

      - name: Build portable ZIP
        shell: bash
        run: |
          set -eu
          VERSION="${{ steps.version.outputs.version }}"
          NAME="gophertrunk-${VERSION}-windows-amd64"
          mkdir -p "dist/${NAME}"
          cp -r dist/staging/. "dist/${NAME}/"
          (cd dist && 7z a "${NAME}.zip" "${NAME}")

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer/windows/gophertrunk.iss
          options: /DAppVersion=${{ steps.version.outputs.version }} /Qp

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            dist/*.zip
            dist/*setup.exe

  linux:
    name: Build Linux tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build gophertrunk
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          NAME="gophertrunk-${VERSION}-linux-amd64"
          mkdir -p "dist/${NAME}"
          go build \
            -trimpath \
            -ldflags "-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION} -X github.com/MattCheramie/GopherTrunk/internal/version.Commit=${COMMIT} -X github.com/MattCheramie/GopherTrunk/internal/version.BuildTime=${BUILD_TIME}" \
            -o "dist/${NAME}/gophertrunk" \
            ./cmd/gophertrunk
          cp README.md LICENSE config.example.yaml "dist/${NAME}/"
          (cd dist && tar -czf "${NAME}.tar.gz" "${NAME}")

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: [windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact tree
        run: |
          set -eu
          mkdir -p out
          find dist -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.tar.gz' \) \
            -exec cp {} out/ \;
          (cd out && sha256sum * > SHA256SUMS)
          ls -la out

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # SemVer prerelease policy: any v0.x.y tag is treated as a
          # prerelease (sub-1.0 = "not yet stable" per SemVer §4); any
          # tag with a hyphenated suffix (e.g. v1.0.0-rc.1, v1.0.0-beta)
          # is also a prerelease per SemVer §9. Stable releases
          # (v1.0.0+, no suffix) land with prerelease=false so the
          # softprops/action-gh-release "latest" auto-detection picks
          # them as the operator-facing default.
          if [[ "${VERSION}" =~ ^v0\. ]] || [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GopherTrunk ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: |
            out/*
          body: |
            ## Install

            **Windows 11:** download `gophertrunk-${{ steps.version.outputs.version }}-windows-amd64-setup.exe` and double-click. The installer adds GopherTrunk to your Start Menu — single static binary, no DLLs to ship. After install, follow [INSTALL-WINDOWS.md](https://github.com/MattCheramie/GopherTrunk/blob/main/docs/install-windows.md) to install the WinUSB driver via Zadig — the OS won't see your RTL-SDR until you do this once.

            **Linux:** extract `gophertrunk-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` and run `./gophertrunk`. Single static binary; no system dependencies needed.

            All artifacts are SHA-256-checksummed in `SHA256SUMS`.
