name: Release

# Builds Windows + Linux artifacts when a SemVer tag is pushed (or
# when the workflow is triggered manually from the Actions tab) and
# uploads them to a GitHub Release.
#
# Pure-Go since PR-09: every build runs CGO_ENABLED=0. The Windows
# job no longer needs MSYS2 / mingw / DLL bundling; the Linux job no
# longer needs librtlsdr-dev. Inno Setup turns the bundled directory
# into a single setup.exe the user can run on Windows 11.
#
# Outputs in the GitHub Release:
#
#   gophertrunk-<ver>-windows-amd64-setup.exe   one-click installer (x64)
#   gophertrunk-<ver>-windows-amd64.zip         portable ZIP (x64)
#   gophertrunk-<ver>-windows-arm64.zip         portable ZIP (Windows on ARM)
#   gophertrunk-<ver>-linux-amd64.tar.gz        Linux x86_64 tarball
#   gophertrunk-<ver>-linux-arm64.tar.gz        Linux aarch64 tarball
#   gophertrunk-<ver>-darwin-amd64.tar.gz       macOS Intel tarball
#   gophertrunk-<ver>-darwin-arm64.tar.gz       macOS Apple Silicon tarball
#   SHA256SUMS                                  per-file SHA-256 checksums
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. v0.1.0). Must start with 'v'."
        required: true
        default: "v0.0.0"

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web console (gophertrunk-web)
        shell: bash
        run: |
          set -eu
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Build gophertrunk.exe
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/staging
          go build \
            -trimpath \
            -ldflags "-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION} -X github.com/MattCheramie/GopherTrunk/internal/version.Commit=${COMMIT} -X github.com/MattCheramie/GopherTrunk/internal/version.BuildTime=${BUILD_TIME}" \
            -o dist/staging/gophertrunk.exe \
            ./cmd/gophertrunk

      - name: Stage docs + web console
        shell: bash
        run: |
          set -eu
          STAGE=dist/staging
          cp README.md LICENSE config.example.yaml "$STAGE/"
          cp docs/install-windows.md "$STAGE/INSTALL-WINDOWS.md"
          # Standalone browser console bundled into each release. The
          # Inno Setup script consumes this directory and asks the
          # user where to install it; the portable ZIP just includes
          # it next to the binary.
          mkdir -p "$STAGE/gophertrunk-web"
          cp -r web/dist/. "$STAGE/gophertrunk-web/"

      - name: Download Zadig (pinned + SHA256-verified)
        shell: pwsh
        # Bumping Zadig: pick the latest stable from
        # https://github.com/pbatard/libwdi/releases — note that
        # the release tag is the libwdi version (e.g. v1.5.1) and
        # the asset name is zadig-<zadig_version>.exe (e.g. 2.9).
        # Update all three vars below, then verify locally:
        #   (Get-FileHash zadig-X.Y.exe -Algorithm SHA256).Hash
        env:
          LIBWDI_VERSION: "v1.5.1"
          ZADIG_VERSION: "2.9"
          ZADIG_SHA256: "4ecaa95df3da3621486a043aef8b3050b8bafe7c901402871e816229ef82039b"
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/pbatard/libwdi/releases/download/${env:LIBWDI_VERSION}/zadig-${env:ZADIG_VERSION}.exe"
          $dest = "dist/staging/zadig.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $actual = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
          $expected = $env:ZADIG_SHA256.ToLower()
          if ($actual -ne $expected) {
            throw "Zadig SHA256 mismatch: got $actual, want $expected"
          }
          Write-Host "Zadig SHA256 OK: $actual"

      - name: Build portable ZIP (amd64)
        shell: bash
        run: |
          set -eu
          VERSION="${{ steps.version.outputs.version }}"
          NAME="gophertrunk-${VERSION}-windows-amd64"
          mkdir -p "dist/${NAME}"
          cp -r dist/staging/. "dist/${NAME}/"
          (cd dist && 7z a "${NAME}.zip" "${NAME}")

      - name: Build Inno Setup installer (amd64)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer/windows/gophertrunk.iss
          options: /DAppVersion=${{ steps.version.outputs.version }} /Qp

      - name: Build gophertrunk.exe (arm64)
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: arm64
        run: |
          set -eu
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          NAME="gophertrunk-${VERSION}-windows-arm64"
          mkdir -p "dist/${NAME}"
          go build \
            -trimpath \
            -ldflags "-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION} -X github.com/MattCheramie/GopherTrunk/internal/version.Commit=${COMMIT} -X github.com/MattCheramie/GopherTrunk/internal/version.BuildTime=${BUILD_TIME}" \
            -o "dist/${NAME}/gophertrunk.exe" \
            ./cmd/gophertrunk
          cp README.md LICENSE config.example.yaml "dist/${NAME}/"
          cp docs/install-windows.md "dist/${NAME}/INSTALL-WINDOWS.md"
          mkdir -p "dist/${NAME}/gophertrunk-web"
          cp -r web/dist/. "dist/${NAME}/gophertrunk-web/"
          (cd dist && 7z a "${NAME}.zip" "${NAME}")

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.zip
            dist/*setup.exe

  linux:
    name: Build Linux tarballs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web console (gophertrunk-web)
        run: |
          set -eu
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Linux tarballs
        env:
          CGO_ENABLED: "0"
          GOOS: linux
        run: |
          set -eu
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION} -X github.com/MattCheramie/GopherTrunk/internal/version.Commit=${COMMIT} -X github.com/MattCheramie/GopherTrunk/internal/version.BuildTime=${BUILD_TIME}"
          for ARCH in amd64 arm64; do
            NAME="gophertrunk-${VERSION}-linux-${ARCH}"
            mkdir -p "dist/${NAME}"
            GOARCH="${ARCH}" go build \
              -trimpath \
              -ldflags "${LDFLAGS}" \
              -o "dist/${NAME}/gophertrunk" \
              ./cmd/gophertrunk
            cp README.md LICENSE config.example.yaml "dist/${NAME}/"
            mkdir -p "dist/${NAME}/gophertrunk-web"
            cp -r web/dist/. "dist/${NAME}/gophertrunk-web/"
            (cd dist && tar -czf "${NAME}.tar.gz" "${NAME}")
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.tar.gz

  macos:
    name: Build macOS bundles
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web console (gophertrunk-web)
        run: |
          set -eu
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build macOS bundles
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
        run: |
          set -eu
          VERSION="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION} -X github.com/MattCheramie/GopherTrunk/internal/version.Commit=${COMMIT} -X github.com/MattCheramie/GopherTrunk/internal/version.BuildTime=${BUILD_TIME}"
          for ARCH in amd64 arm64; do
            NAME="gophertrunk-${VERSION}-darwin-${ARCH}"
            mkdir -p "dist/${NAME}"
            GOARCH="${ARCH}" go build \
              -trimpath \
              -ldflags "${LDFLAGS}" \
              -o "dist/${NAME}/gophertrunk" \
              ./cmd/gophertrunk
            cp README.md LICENSE config.example.yaml "dist/${NAME}/"
            mkdir -p "dist/${NAME}/gophertrunk-web"
            cp -r web/dist/. "dist/${NAME}/gophertrunk-web/"
            (cd dist && tar -czf "${NAME}.tar.gz" "${NAME}")
          done

      - uses: actions/upload-artifact@v4
        with:
          name: darwin
          path: dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: [windows, linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact tree
        run: |
          set -eu
          mkdir -p out
          find dist -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.tar.gz' \) \
            -exec cp {} out/ \;
          (cd out && sha256sum * > SHA256SUMS)
          ls -la out

      - name: Compute version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # SemVer prerelease policy: any v0.x.y tag is treated as a
          # prerelease (sub-1.0 = "not yet stable" per SemVer §4); any
          # tag with a hyphenated suffix (e.g. v1.0.0-rc.1, v1.0.0-beta)
          # is also a prerelease per SemVer §9. Stable releases
          # (v1.0.0+, no suffix) land with prerelease=false so the
          # softprops/action-gh-release "latest" auto-detection picks
          # them as the operator-facing default.
          if [[ "${VERSION}" =~ ^v0\. ]] || [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: GopherTrunk ${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: |
            out/*
          body: |
            ## Install

            **Windows 11 (x64):** download `gophertrunk-${{ steps.version.outputs.version }}-windows-amd64-setup.exe` and double-click. The installer adds GopherTrunk to your Start Menu — single static binary, no DLLs to ship — and **prompts for a folder to install the browser-based web operator console** (default: `Documents\GopherTrunk Web Console`). After install, follow [INSTALL-WINDOWS.md](https://github.com/MattCheramie/GopherTrunk/blob/main/docs/install-windows.md) to install the WinUSB driver via Zadig — the OS won't see your RTL-SDR until you do this once.

            **Windows on ARM:** extract `gophertrunk-${{ steps.version.outputs.version }}-windows-arm64.zip` (no installer for arm64 yet — portable ZIP only). The web console lives in the `gophertrunk-web\` subfolder inside the zip.

            **macOS:** extract `gophertrunk-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz` (Apple Silicon) or `gophertrunk-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz` (Intel) and run `./gophertrunk`. Builds are unsigned — right-click → Open the first time to bypass Gatekeeper.

            **Linux:** extract `gophertrunk-${{ steps.version.outputs.version }}-linux-amd64.tar.gz` (x86_64) or `gophertrunk-${{ steps.version.outputs.version }}-linux-arm64.tar.gz` (aarch64, e.g. Raspberry Pi 4/5) and run `./gophertrunk`. Single static binary; no system dependencies needed.

            **Web operator console:** every archive includes a standalone `gophertrunk-web/` folder. Open its `index.html` in any browser and point it at a running daemon. Setup walkthrough: [gophertrunk.org/web.html](https://gophertrunk.org/web.html).

            All artifacts are SHA-256-checksummed in `SHA256SUMS`.
