name: Windows installer (PR)

# Builds the Windows installer (.exe) on every pull request so
# regressions in the Windows build, the staged file set, or the Inno
# Setup script surface before merge — not at the next release tag.
#
# Pure-Go since PR-09: no MSYS2 / mingw / DLL bundling. Just
# `actions/setup-go` + `CGO_ENABLED=0 go build` + Inno Setup.
#
# Concurrency cancels any in-flight run for the same PR when a new
# commit is pushed, so quick rebases don't burn idle Windows runner
# minutes.
#
# paths-ignore: docs-only / config-example-only / license-only PRs
# can't possibly affect the installer (it bundles only the binary +
# docs/LICENSE, and a doc change doesn't change the binary). Skip the
# Windows build to save ~2 min of windows-latest runner time per
# docs PR.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
      - "config.example.yaml"
  workflow_dispatch:

concurrency:
  group: installer-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: version
        shell: bash
        run: |
          # Synthetic version for PR builds: pr-<number>-<short-sha>.
          # Filename-safe; gets stamped into the binary's version
          # string and the installer's AppVersion.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
            echo "version=pr-${{ github.event.pull_request.number }}-${SHA}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            echo "version=manual-${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web console (gophertrunk-web)
        shell: bash
        run: |
          set -eu
          cd web
          npm ci --no-audit --no-fund
          npm run build

      - name: Build gophertrunk.exe
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/staging
          go build \
            -trimpath \
            -ldflags "-X github.com/MattCheramie/GopherTrunk/internal/version.Version=${VERSION}" \
            -o dist/staging/gophertrunk.exe \
            ./cmd/gophertrunk

      - name: Stage docs + web console
        shell: bash
        run: |
          set -eu
          STAGE=dist/staging
          cp README.md LICENSE config.example.yaml "$STAGE/"
          cp docs/install-windows.md "$STAGE/INSTALL-WINDOWS.md"
          mkdir -p "$STAGE/gophertrunk-web"
          cp -r web/dist/. "$STAGE/gophertrunk-web/"

      - name: Download Zadig (pinned + SHA256-verified)
        shell: pwsh
        # Bumping Zadig: pick the latest stable from
        # https://github.com/pbatard/libwdi/releases — note that
        # the release tag is the libwdi version (e.g. v1.5.1) and
        # the asset name is zadig-<zadig_version>.exe (e.g. 2.9).
        # Update all three vars below, then verify locally:
        #   (Get-FileHash zadig-X.Y.exe -Algorithm SHA256).Hash
        env:
          LIBWDI_VERSION: "v1.5.1"
          ZADIG_VERSION: "2.9"
          ZADIG_SHA256: "4ecaa95df3da3621486a043aef8b3050b8bafe7c901402871e816229ef82039b"
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/pbatard/libwdi/releases/download/${env:LIBWDI_VERSION}/zadig-${env:ZADIG_VERSION}.exe"
          $dest = "dist/staging/zadig.exe"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $actual = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
          $expected = $env:ZADIG_SHA256.ToLower()
          if ($actual -ne $expected) {
            throw "Zadig SHA256 mismatch: got $actual, want $expected"
          }
          Write-Host "Zadig SHA256 OK: $actual"

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: installer/windows/gophertrunk.iss
          options: /DAppVersion=${{ steps.version.outputs.version }} /Qp

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ steps.version.outputs.version }}
          path: dist/*setup.exe
          retention-days: 14
          if-no-files-found: error
