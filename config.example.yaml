# Example GopherTrunk daemon configuration. Copy to ./config.yaml (or
# whatever path you pass to `gophertrunk run -config`) and adjust to
# match your hardware + systems.

log:
  level: info       # debug | info | warn | error
  format: text      # text | json

api:
  http_addr: "127.0.0.1:8080"   # HTTP REST + SSE + WebSocket
  grpc_addr: "127.0.0.1:50051"  # gRPC

  # Bearer-token authentication on the mutation endpoints (end call,
  # talkgroup priority/lockout, retention sweep, tone-out detector
  # reset, scanner cockpit, audio cockpit).
  #
  # mode:
  #   auto      — (default) require a token on non-loopback binds;
  #               bypass the check when bound to 127.0.0.1 / ::1
  #               (peer-cred via kernel-enforced reachability is a
  #               reasonable trust proxy on a single-host operator
  #               box). Recommended for most deployments.
  #   required  — require a token on every mutation, even from
  #               loopback. Recommended when the daemon shares a
  #               host with untrusted users.
  #   disabled  — wide-open mutations, no auth. Equivalent to the
  #               legacy `allow_mutations: true` behaviour. The
  #               daemon logs a warning at startup.
  #
  # token_file is preferred over inline token so the secret doesn't
  # live in config.yaml. The daemon re-reads it on every request so
  # operators can rotate without a restart.
  #
  # trusted_networks is a CIDR allowlist that bypasses the token
  # check under `auto` mode. Loopback (127.0.0.1/32, ::1/128) is
  # implicitly trusted under `auto` and doesn't need to be listed.
  auth:
    mode: "auto"
    # token: "inline-token-here"   # discouraged; use token_file
    # token_file: "/etc/gophertrunk/api-token"
    # trusted_networks:
    #   - "10.0.0.0/8"
    #   - "192.168.0.0/16"

  # Legacy gate. Setting this to true logs a deprecation warning and
  # maps to `auth.mode: disabled` (mutations wide open). Prefer
  # `auth.mode` for new deployments.
  allow_mutations: false

  # Cross-origin browser access. Off by default — the daemon emits
  # no Access-Control-* headers and rejects WebSocket upgrades whose
  # Origin header isn't on the allow-list. Enable when serving the
  # bundled web UI (gophertrunk-web/) from a different origin than
  # the daemon. Common values:
  #
  #   - "null"                          allow web UI opened via file://
  #   - "http://laptop.local:8000"      allow a specific static host
  #   - "*"                             allow any origin
  #
  # Browsers send the literal string "null" as the Origin for file://
  # loads, so listing "null" is what enables the easiest LAN
  # deployment (daemon on a Raspberry Pi, web UI as a folder copied
  # to a laptop and opened with a double-click).
  cors:
    allowed_origins: []
    # allowed_origins:
    #   - "null"
    #   - "http://laptop.local:8000"

metrics:
  enabled: true     # mounts /metrics on the HTTP API

storage:
  path: "/var/lib/gophertrunk/calls.db"
  cc_cache_file: "/var/lib/gophertrunk/cc-cache.json"

recordings:
  dir: "/var/lib/gophertrunk/recordings"
  sample_rate: 8000
  write_raw: true   # also append a .raw sidecar with the vocoder frames
  equalizer:
    enabled: false  # CMA blind equalizer in the FM voice chain (simulcast mitigation)
    taps: 8         # default 8 when enabled
    step_size: 0.0001  # default 1e-4 when enabled

retention:
  call_log_days: 30   # 0 disables call-log row sweep
  files_days: 14      # 0 disables filesystem sweep
  interval: "1h"      # how often the sweeper runs

sdr:
  sample_rate: 2_400_000
  devices:
    - serial: "00000001"   # match `gophertrunk sdr list`; first-found wins when blank
      role: control        # control | voice | auto
      ppm: 0               # 0 is fine for TCXO-equipped units like the NESDR Smart v5
      gain: "auto"         # "auto" or a tenths-of-dB string ("496" = 49.6 dB)
      bias_tee: false      # enable the 5V bias-tee output for an external LNA
    - serial: "00000002"
      role: voice
      ppm: 0
      gain: "auto"
      bias_tee: false

trunking:
  systems:
    - name: "Example-P25"
      protocol: p25
      control_channels:
        - 851_000_000
        - 852_000_000
      talkgroup_file: "/etc/gophertrunk/talkgroups-p25.csv"

  # Per-protocol FEC is on by default — every protocol the daemon
  # supports (TETRA, LTR, P25 Phase 2, NXDN, EDACS, MPT 1327,
  # Motorola Type II, D-STAR) ships its spec-correct on-air decoder
  # chain enabled without needing per-system YAML keys. Operators
  # feeding pre-stripped capture files (DSD-FME `-r` dumps, OP25
  # fixtures, MMDVMHost / DSDcc test data) opt out per-system with
  # the keys below. TETRA additionally requires a non-zero
  # `tetra_colour_code` for non-BSCH channels; descrambling produces
  # garbage without it.
  #
  # The full key reference + on / off semantics lives in the README's
  # "FEC opt-outs" section: https://github.com/MattCheramie/GopherTrunk#fec-opt-outs
  #
  # Example opt-outs for operators using pre-stripped captures.
  # Copy any block, uncomment, and tune to your system:
  #
  #   - name: "Legacy-Motorola"
  #     protocol: motorola
  #     control_channels: [851_012_500]
  #     motorola_bch_mode: "off"        # pre-stripped 32-bit raw OSWs
  #
  #   - name: "Legacy-LTR"
  #     protocol: ltr
  #     control_channels: [935_012_500]
  #     ltr_fcs_mode: "off"             # skip CRC-7 FCS (synth fixture)
  #     ltr_manchester_mode: "off"      # raw NRZ stream
  #
  #   - name: "Legacy-NXDN"
  #     protocol: nxdn
  #     control_channels: [462_212_500]
  #     nxdn_viterbi_mode: "off"        # legacy 44-dibit raw CAC
  #     # nxdn_deviation_hz: 2400       # override 1800 Hz spec default
  #                                     # for non-spec transmitters (see
  #                                     # samples/nxdn/README.md sweep recipe)
  #
  #   - name: "Simulcast-P25"
  #     protocol: p25
  #     control_channels: [420_087_500]
  #     p25_phase1_demod_mode: "cqpsk"  # LSM linear-CQPSK — required on
  #                                     # P25 simulcast sites whose CC
  #                                     # is transmitted as Linear
  #                                     # Simulcast Modulation rather
  #                                     # than C4FM (issue #275)
  #
  #   - name: "Legacy-P25-Phase2"
  #     protocol: p25
  #     control_channels: [851_006_250]
  #     p25_phase2_trellis_mode: "off"  # legacy 72-dibit raw MAC PDU
  #     # p25_phase2_rs_mode: "on"      # RS(24, 16, 9) syndrome drop
  #     # p25_phase2_scrambler_mode: "probe"  # blind PN44 slot probe
  #     #                              # (degrades to off without rs:on)
  #     # p25_phase2_clock_mode: "naive"      # decimate; default Gardner
  #
  #   - name: "Legacy-TETRA"
  #     protocol: tetra
  #     control_channels: [410_000_000]
  #     tetra_colour_code: 53           # required for non-BSCH (low 30 bits)
  #     tetra_channel: "sch/hd"         # sch/hd | sch/f | sch/hu | bsch | aach
  #     tetra_channel_coding: "off"     # legacy 48-dibit raw PDU
  #     # tetra_clock_mode: "naive"     # decimate; default Gardner
  #
  #   - name: "Legacy-EDACS"
  #     protocol: edacs
  #     control_channels: [856_012_500]
  #     edacs_bch_mode: "off"           # legacy pre-stripped 40-bit CCW
  #
  #   - name: "Legacy-MPT1327"
  #     protocol: mpt1327
  #     control_channels: [165_787_500]
  #     mpt1327_bch_mode: "off"         # legacy 38-bit pre-stripped codeword
  #     # mpt1327_cwsc_tolerance: 0     # exact CWSC match (default: 2 bits)
  #
  #   - name: "Legacy-DStar"
  #     protocol: dstar
  #     control_channels: [144_000_000]
  #     dstar_fec_mode: "on"            # default off — flip on for raw 660-bit
  #                                     # on-wire D-STAR JARL DV-mode headers
  #
  # Encrypted DMR systems (ARC4 / RC4 "Enhanced Privacy"). If you are
  # authorized to monitor a DMR system that encrypts voice with ARC4
  # and you hold the key, list it under `encryption_keys`. GopherTrunk
  # decrypts only with operator-supplied keys — it performs no key
  # recovery. `key_id` matches the key identifier the radios carry in
  # the privacy header (a system may rotate between several keys).
  # `key` is hex; whitespace and an optional "0x" prefix are ignored.
  #
  #   - name: "Example-DMR-Encrypted"
  #     protocol: dmr
  #     control_channels: [451_000_000]
  #     talkgroup_file: "/etc/gophertrunk/talkgroups-dmr.csv"
  #     encryption_keys:
  #       - key_id: 1
  #         algorithm: rc4              # only "rc4" is supported today
  #         key: "0123456789"           # hex-encoded key

# Police-scanner subsystems:
#   - scan_mode controls the engine's per-grant gate. "all" follows every
#     non-locked-out grant (the original behavior). "list" only follows
#     grants whose talkgroup carries Scan=true; Emergency grants bypass.
#   - cc_hunt is the multi-system control-channel scanner. Operator can
#     hold/resume/force-retune any system from the TUI Scanner panel.
#   - conventional is the fixed-frequency analog FM scan list. Requires
#     a dedicated Voice SDR (the last voice device in the pool is used).
scanner:
  scan_mode: all       # all | list
  cc_hunt:
    enabled: true
    dwell_ms: 3000
    backoff_ms: 5000
    max_backoff_ms: 60000
  # manual_tune_enabled forces construction of the conventional
  # scanner so the TUI's `f` key (or POST /api/v1/scanner/manual_tune)
  # can VFO-tune at runtime even when no static channels are
  # configured. With this set the scanner steals one Voice SDR
  # from the trunking pool regardless of how many Voice SDRs
  # exist.
  #
  # Default false; the daemon auto-detects when >= 2 Voice SDRs
  # are present and constructs the scanner from the spare without
  # needing this flag. To keep all Voice SDRs reserved for
  # trunking even with a spare, set manual_tune_disabled: true to
  # opt out of the auto-detect.
  manual_tune_enabled: false
  # manual_tune_disabled vetoes the auto-detect rule.
  manual_tune_disabled: false
  conventional: []
  # Example conventional channels:
  # conventional:
  #   - label: "Sheriff Repeater"
  #     frequency_hz: 155895000
  #     mode: fm
  #     squelch_dbfs: -48
  #     hangtime_ms: 1500
  #     priority: 4
  #     # Optional CTCSS / DCS sub-audible squelch gate. With tone
  #     # gating set the scanner only opens when both the carrier is
  #     # present AND the configured tone is detected, so adjacent-
  #     # system traffic on the same frequency doesn't trigger a
  #     # false dwell. Omit / set mode: none to disable.
  #     tone:
  #       mode: ctcss        # ctcss | dcs | none
  #       ctcss_hz: 100.0    # required for ctcss
  #       # dcs_code: "023"  # required for dcs (3-digit octal)

# audio routes decoded PCM to the host's speakers. Disabled by default;
# WAV recording is unaffected and continues whether audio is on or off.
# Backend init failure (no audio device, no PulseAudio/ALSA) falls back
# to a silent player automatically so the daemon stays running.
audio:
  enabled: false       # set true to play decoded calls live
  device: ""           # empty = system default sink; "null" forces no-op;
                       # on Linux, "ioctl" or "ioctl:hw:C,D" bypasses
                       # libasound2 entirely (direct kernel ioctl on
                       # /dev/snd/pcmC*D*p — useful for distroless /
                       # Alpine containers without libasound2.so.2)
  sample_rate: 8000    # must match recordings.sample_rate
  buffer_ms: 80        # playback queue depth; higher = more jitter-tolerant
  volume: 0.8          # 0..1 software gain
  muted: false

# tone_out fires events.KindToneAlert when the configured paging tones
# are detected on a Voice device's PCM stream. An empty `profiles`
# list disables the detector (the daemon default).
#
# Two-tone sequential (Motorola Quick Call II) is the most common US
# fire/EMS pattern: an A-tone followed by a B-tone, each with a
# typical Quick Call II frequency from the Motorola 1000-1400 Hz
# group. Operators verify tone pairs against their agency's
# dispatch console — the example below is illustrative only.
#
# Per-profile schema (see internal/voice/toneout/profile.go for the
# Validate() rules):
#   name                 — required, unique within profiles list
#   alpha_tag            — human-readable label (UI / webhook / log)
#   tones                — ordered tone list, ≥ 1 entry
#     frequency_hz       — target tone (Hz)
#     min_duration       — required dwell before counting
#     max_duration       — caps the on-time; 0 = no upper bound
#   tolerance_hz         — frequency drift tolerance (default 15 Hz)
#   magnitude_threshold  — Goertzel-magnitude floor (default 0.05)
#   max_gap              — silence allowed between tones (default 200ms)
#   cooldown             — re-fire suppression window (default 30s)
#   system               — restrict to one trunked system (empty = all)
#   group_id             — restrict to one talkgroup (0 = all)
tone_out:
  profiles:
    # Quick Call II two-tone sequential — the canonical US fire/EMS
    # paging pattern. Replace the frequencies with your agency's
    # actual A/B tones.
    - name: "station-1-engine"
      alpha_tag: "Station 1 Engine"
      cooldown: "30s"
      tones:
        - frequency_hz: 1042.2
          min_duration: "250ms"
          max_duration: "1500ms"
        - frequency_hz: 1297.4
          min_duration: "2.5s"
          max_duration: "5s"

    # ---------------------------------------------------------------
    # Additional example profiles (commented out — uncomment and
    # adjust per your agency). Multiple profiles can coexist; the
    # detector fires the first one whose tone sequence matches.
    # ---------------------------------------------------------------
    #
    # # Single-tone supervisory page (older simplex pattern). Useful
    # # when an agency still uses a one-shot dispatcher tone instead
    # # of a sequential A/B pair.
    # - name: "supervisor-recall"
    #   alpha_tag: "Supervisor Recall"
    #   cooldown: "60s"
    #   tones:
    #     - frequency_hz: 1500.0
    #       min_duration: "500ms"
    #       max_duration: "3s"
    #
    # # Two-tone with system + talkgroup scoping. Use when the same
    # # tone pair appears on multiple systems and you only want the
    # # alert to fire for one talkgroup on one named system.
    # - name: "metro-fire-dispatch"
    #   alpha_tag: "Metro Fire Dispatch"
    #   system: "Example-P25"     # matches trunking.systems[].name
    #   group_id: 42              # talkgroup ID
    #   cooldown: "45s"
    #   tones:
    #     - frequency_hz: 853.8
    #       min_duration: "250ms"
    #       max_duration: "1500ms"
    #     - frequency_hz: 960.9
    #       min_duration: "2.5s"
    #       max_duration: "5s"
    #
    # # Tightened tolerances for an agency with very stable
    # # frequency reference. Drops the default 15 Hz tolerance to
    # # 5 Hz and raises the magnitude floor to filter weak co-channel
    # # bleed-over.
    # - name: "county-ems-tac"
    #   alpha_tag: "County EMS Tac"
    #   tolerance_hz: 5.0
    #   magnitude_threshold: 0.10
    #   max_gap: "100ms"
    #   cooldown: "30s"
    #   tones:
    #     - frequency_hz: 1122.5
    #       min_duration: "300ms"
    #       max_duration: "1500ms"
    #     - frequency_hz: 1465.3
    #       min_duration: "2.5s"
    #       max_duration: "5s"
